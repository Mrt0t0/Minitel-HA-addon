<script>
(function(){
'use strict';
var VT={
  COLS:40,ROWS:24,CW:12,CH:18,PAL:['#000000','#ff0000','#00cc00','#ffff00','#0000ff','#ff00ff','#00ffff','#ffffff'],G0:{35:'#',36:'$',64:'à',91:'°',92:'ç',93:'§',94:'^',95:'_',96:'µ',123:'é',124:'ù',125:'è',126:'¨',127:' '},blinkOn:true,current:null,
  makeCell:function(){return{ch:' ',fg:7,bg:0,blink:false,conceal:false,invert:false,graphics:false,bits:0,sep:false,lr:false,w:1,h:1,skip:false};},
  makeScreen:function(){var s=[];for(var r=0;r<this.ROWS;r++){var row=[];for(var c=0;c<this.COLS;c++)row.push(this.makeCell());s.push(row);}return s;},
  makeState:function(){return{row:0,col:0,fg:7,bg:0,graphics:false,blink:false,conceal:false,invert:false,sep:false,sizeW:1,sizeH:1,lastCell:this.makeCell()};},
  cloneCell:function(c){return JSON.parse(JSON.stringify(c));},
  decodeText:function(b){b&=0x7f;return this.G0[b]!==undefined?this.G0[b]:String.fromCharCode(b);},
  decodeMosaicBits:function(b){b&=0x7f;var sep=(b>=0x40&&b<=0x5f),lr=(b>=0x60&&b<=0x7f),v=lr?(b-0x60):sep?(b-0x40):(b-0x20);return{bits:v&31,lr:lr,sep:sep};},
  clear:function(screen,cell){for(var r=0;r<this.ROWS;r++)for(var c=0;c<this.COLS;c++)screen[r][c]=this.cloneCell(cell||this.makeCell());},
  clearLineEnd:function(screen,state){for(var c=state.col;c<this.COLS;c++){screen[state.row][c]={ch:' ',fg:state.fg,bg:state.bg,blink:false,conceal:false,invert:false,graphics:false,bits:0,sep:false,lr:false,w:1,h:1,skip:false};}},
  handleEsc:function(state,n){
    if(n>=0x40&&n<=0x47){state.fg=n-0x40;return;}
    if(n>=0x50&&n<=0x57){state.bg=n-0x50;return;}
    if(n===0x48){state.blink=true;return;}
    if(n===0x49){state.blink=false;return;}
    if(n===0x4c){state.sizeW=1;state.sizeH=1;return;}
    if(n===0x4d){state.sizeW=1;state.sizeH=2;return;}
    if(n===0x4e){state.sizeW=2;state.sizeH=1;return;}
    if(n===0x4f){state.sizeW=2;state.sizeH=2;return;}
    if(n===0x59){state.sep=false;return;}
    if(n===0x5a){state.sep=true;return;}
    if(n===0x5c){state.conceal=true;return;}
    if(n===0x5d){state.conceal=false;return;}
    if(n===0x4a){state.fg=7;state.bg=0;state.graphics=false;state.blink=false;state.conceal=false;state.invert=false;state.sep=false;state.sizeW=1;state.sizeH=1;return;}
  },
  normalizeSize:function(state){var w=state.sizeW||1,h=state.sizeH||1;if(state.col>=this.COLS)state.col=0;if(state.row>=this.ROWS)state.row=this.ROWS-1;if(state.col+w>this.COLS)w=1;if(state.row+h>this.ROWS)h=1;return{w:w,h:h};},
  placeCell:function(screen,state,cell){
    if(state.row<0||state.row>=this.ROWS||state.col<0||state.col>=this.COLS)return;
    var sz=this.normalizeSize(state);cell.w=sz.w;cell.h=sz.h;cell.skip=false;screen[state.row][state.col]=cell;
    for(var dy=0;dy<cell.h;dy++)for(var dx=0;dx<cell.w;dx++)if(dx||dy){var rr=state.row+dy,cc=state.col+dx;if(rr<this.ROWS&&cc<this.COLS)screen[rr][cc]={skip:true,anchorR:state.row,anchorC:state.col,bg:cell.bg};}
    state.lastCell=this.cloneCell(cell);state.col+=cell.w;if(state.col>=this.COLS){state.col=0;state.row=Math.min(this.ROWS-1,state.row+1);}
  },
  repeatCell:function(screen,state,count){for(var i=0;i<count;i++){var cell=this.cloneCell(state.lastCell||this.makeCell());cell.skip=false;this.placeCell(screen,state,cell);}},
  parse:function(bytes){
    var screen=this.makeScreen(),state=this.makeState();
    for(var i=0;i<bytes.length;i++){
      var raw=bytes[i],b=raw&0x7f;
      if(raw>=0x80&&raw<=0x9f){this.handleEsc(state,raw-0x40);continue;}
      if(b===0x0c){screen=this.makeScreen();state=this.makeState();continue;}
      if(b===0x08){state.col=Math.max(0,state.col-1);continue;}
      if(b===0x09){state.col=Math.min(this.COLS-1,state.col+1);continue;}
      if(b===0x0a){state.row=Math.min(this.ROWS-1,state.row+1);continue;}
      if(b===0x0b){state.row=Math.max(0,state.row-1);continue;}
      if(b===0x0d){state.col=0;continue;}
      if(b===0x0e){state.graphics=true;continue;}
      if(b===0x0f){state.graphics=false;continue;}
      if(b===0x11||b===0x13||b===0x14){continue;}
      if(b===0x12&&i+1<bytes.length){var rep=(bytes[++i]&0x7f)-0x40;if(rep>0)this.repeatCell(screen,state,rep);continue;}
      if(b===0x18){this.clearLineEnd(screen,state);continue;}
      if(b===0x1b&&i+1<bytes.length){this.handleEsc(state,bytes[++i]&0x7f);continue;}
      if(b===0x1f){
        if(i+2<bytes.length){
          var a=bytes[i+1]&0x7f,d=bytes[i+2]&0x7f;
          if(a>=48&&a<=57&&d>=48&&d<=57){var rr=((a-48)*10)+(d-48);state.row=Math.max(0,Math.min(this.ROWS-1,(rr===0?1:rr)-1));state.col=0;i+=2;continue;}
          var r=(bytes[i+1]&0x7f)-0x40,c=(bytes[i+2]&0x7f)-0x40;state.row=Math.max(0,Math.min(this.ROWS-1,(r||1)-1));state.col=Math.max(0,Math.min(this.COLS-1,(c||1)-1));i+=2;continue;
        }
        continue;
      }
      if(b<0x20)continue;
      if(state.graphics){
        var m=this.decodeMosaicBits(raw);
        this.placeCell(screen,state,{ch:' ',fg:state.fg,bg:state.bg,blink:state.blink,conceal:state.conceal,invert:state.invert,graphics:true,bits:m.bits,sep:(state.sep||m.sep),lr:m.lr,w:state.sizeW,h:state.sizeH,skip:false});
      }else{
        this.placeCell(screen,state,{ch:this.decodeText(raw),fg:state.fg,bg:state.bg,blink:state.blink,conceal:state.conceal,invert:state.invert,graphics:false,bits:0,sep:false,lr:false,w:state.sizeW,h:state.sizeH,skip:false});
      }
    }
    return screen;
  },
